# Builds the research console (web/) and deploys it to the Azure Static Web
# App on every push to main that touches web/. The SWA was provisioned empty
# by Bicep (infra/modules/staticwebapp.bicep) and has no repo link of its own,
# so without this workflow the console only updates via a manual SWA CLI
# deploy (docs/01-azure-deployment.md step 12).
#
# One-time setup: copy the deployment token (portal: Static Web App ->
# Overview -> Manage deployment token) into the repo secret
# AZURE_STATIC_WEB_APPS_API_TOKEN.

name: Deploy web console (Static Web App)

on:
  push:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/deploy-web-console.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Test
        working-directory: web
        run: npm test

      - name: Build
        working-directory: web
        run: npm run build

      # staticwebapp.config.json lives in web/, outside Vite's public/ dir, so
      # the build does not copy it; SWA reads it from the deployed root.
      - name: Include SWA config in output
        working-directory: web
        run: cp staticwebapp.config.json dist/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true
